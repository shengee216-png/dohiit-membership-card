<!DOCTYPE html>
<html>
<head>
  <title>Dohiit Membership Card Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="form-section">
    <h1>Dohiit Membership Card</h1>

    <input type="text" id="memberName" placeholder="Member Name">
    <input type="text" id="memberId" placeholder="Member ID">
    <input type="text" id="membershipType" placeholder="Membership Type">
    <input type="text" id="validFrom" placeholder="Valid From">
    <input type="text" id="validThru" placeholder="Valid Thru">

<h3>Select Gender Template</h3>

<select id="templateSelect">
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>


    <button onclick="generateCard()">Generate Card</button>
    <button onclick="downloadCard()">Download</button>
  </div>

  <div class="card-section">

  <div id="card">

    <img id="cardBg" src="./male.jpg" class="bg">

    <div class="member-name" id="nameText">RAHUL SHARMA</div>
    <div class="member-id" id="idText">DH1002456</div>
    <div class="membership-type" id="typeText">PREMIUM</div>
    <div class="valid-from" id="fromText">20 MAY 2024</div>
    <div class="valid-thru" id="thruText">19 MAY 2025</div>

  </div>



<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
